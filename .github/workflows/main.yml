name: Build MiniBaritone 1.21.11

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Find and build project
        run: |
          echo "Ищу build.gradle..."

          if [ -f "./build.gradle" ]; then
            echo "build.gradle найден в корне"
            gradle build
          elif [ -f "./RaidMineMiniBaritone/build.gradle" ]; then
            echo "build.gradle найден в папке RaidMineMiniBaritone"
            cd RaidMineMiniBaritone
            gradle build
          else
            echo "ОШИБКА: build.gradle не найден"
            echo "Вот файлы в репозитории:"
            find . -maxdepth 3 -type f
            exit 1
          fi

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: MiniBaritone-1.21.11
          path: "**/build/libs/*.jar"
